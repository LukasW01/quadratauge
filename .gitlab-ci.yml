image: "rust:1.86"

stages:
- sast
- cargo
- docker

variables:
  # Docker
  DOCKER_API_VERSION: "1.44"
  # Registry
  REGISTRY: ghcr.io
  # Rust
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: -Dwarnings

default:
  interruptible: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo
      - target

sast:
  stage: sast
include:
- template: Security/SAST.gitlab-ci.yml

lint:
  stage: cargo
  before_script:
    - apt update
    - apt install cmake -y
    - rustup component add rustfmt
    - rustup component add clippy
  script:
    - cargo fmt --check
    - cargo clippy --all-targets

test:junit-report:
  stage: cargo
  before_script:
    - apt update
    - apt install cmake -y
    - mkdir -p $CARGO_HOME/bin && curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C $CARGO_HOME/bin
  script:
    - cargo nextest run --profile ci   

docker_build:
  stage: docker
  image: docker:cli
  before_script:
    - docker login $REGISTRY -u $REGISTRY_USER -p $REGISTRY_PASSWORD
  script:
    - docker build --pull -t "quadratauge" .
    # latest tag
    - docker tag "quadratauge" "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:latest"
    - docker push "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:latest"
    # version tag
    - docker tag "quadratauge" "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:$CI_COMMIT_TAG"
    - docker push "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:$CI_COMMIT_TAG"
  only:
    - tags

