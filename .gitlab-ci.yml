stages:
- test
- docker

default:
  before_script:
    - rustc --version 
    - cargo --version

variables: 
  REGISTRY: ghcr.io

sast:
  stage: test
include:
- template: Security/SAST.gitlab-ci.yml

test:junit-report:
    stage: test
    before_script:
    - cargo install junitify
    script:
    - cargo test -- --format=json -Z unstable-options --report-time | junitify --out $CI_PROJECT_DIR/tests/
    artifacts:
      when: always
      reports:
        junit: $CI_PROJECT_DIR/tests/*.xml
    image: "rust:latest"

lint-code:
    stage: test
    before_script: 
     - rustup component add rustfmt
     - rustup component add clippy
    script:
     - cargo fmt -- --check
     - cargo clippy -- -D warnings
    image: "rust:latest"

docker_build:
  stage: docker
  services:
    - docker:dind
  before_script:
    - docker login $REGISTRY -u $REGISTRY_USER -p $REGISTRY_PASSWORD
  script:
    - docker build --pull -t "quadratauge" .
    # latest tag
    - docker tag "quadratauge" "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:latest"
    - docker push "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:latest"
    # version tag
    - docker tag "quadratauge" "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:$CI_COMMIT_TAG"
    - docker push "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:$CI_COMMIT_TAG"
  image: docker:cli
  only:
    - tags
