image: "rust:1.93"

stages:
- sast
- cargo
- docker

variables:
  # Docker
  DOCKER_API_VERSION: "1.44"
  # Registry
  REGISTRY: ghcr.io
  # Rust
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: -Dwarnings

default:
  interruptible: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo
      - target

sast:
  stage: sast
include:
- template: Security/SAST.gitlab-ci.yml

lint:
  stage: cargo
  before_script:
    - apt update
    - apt install cmake -y
    - rustup component add rustfmt
    - rustup component add clippy
  script:
    - cargo fmt --check
    - cargo clippy --all-targets

test:junit-report:
  stage: cargo
  before_script:
    - apt update
    - apt install cmake -y
    - mkdir -p $CARGO_HOME/bin && curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C $CARGO_HOME/bin
  script:
    - cargo nextest run --profile ci   
  artifacts:
    when: always
    reports:
      junit: $CI_PROJECT_DIR/target/nextest/ci/junit.xml

docker_build:
  stage: docker
  image: docker:cli
  before_script:
    - docker login $REGISTRY -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD"
  script:
    - docker build --pull -t "$CI_PROJECT_NAME" .
    # latest tag
    - docker tag "$CI_PROJECT_NAME" "$REGISTRY/$CI_PROJECT_NAMESPACE_SLUG/$CI_PROJECT_NAME:latest"
    - docker push "$REGISTRY/$CI_PROJECT_NAMESPACE_SLUG/$CI_PROJECT_NAME:latest"
    # version tag
    - docker tag "$CI_PROJECT_NAME" "$REGISTRY/$CI_PROJECT_NAMESPACE_SLUG/$CI_PROJECT_NAME:$CI_COMMIT_TAG"
    - docker push "$REGISTRY/$CI_PROJECT_NAMESPACE_SLUG/$CI_PROJECT_NAME:$CI_COMMIT_TAG"
  only:
    - tags
