stages:
- test
- docker

default:
  before_script:
    - rustc --version 
    - cargo --version
    - add-apt-repository ppa:tomtomtom/yt-dlp -y
    - apt update
    - apt install yt-dlp cmake -y
  interruptible: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo
      - target

variables: 
  REGISTRY: ghcr.io
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: -Dwarnings

sast:
  stage: test
include:
- template: Security/SAST.gitlab-ci.yml

test:junit-report:
    stage: test
    before_script:

    - mkdir -p $CARGO_HOME/bin && curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C $CARGO_HOME/bin
    script:
    - cargo nextest run --profile ci   
    artifacts:
      when: always
      reports:
        junit: $CI_PROJECT_DIR/target/nextest/ci/junit.xml
    image: "rust:latest"

lint:
    stage: test
    before_script: 
     - rustup component add rustfmt
     - rustup component add clippy
    script:
     - cargo fmt --check
     - cargo clippy --all-targets
    image: "rust:latest"

docker_build:
  stage: docker
  services:
    - docker:dind
  before_script:
    - docker login $REGISTRY -u $REGISTRY_USER -p $REGISTRY_PASSWORD
  script:
    - docker build --pull -t "quadratauge" .
    # latest tag
    - docker tag "quadratauge" "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:latest"
    - docker push "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:latest"
    # version tag
    - docker tag "quadratauge" "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:$CI_COMMIT_TAG"
    - docker push "$REGISTRY/$PROJECT_NAMESPACE/quadratauge:$CI_COMMIT_TAG"
  image: docker:cli
  only:
    - tags
